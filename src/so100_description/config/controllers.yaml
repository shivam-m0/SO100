controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # This publishes the joint positions so you can see them in RViz
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # This handles the actual movement commands for the arm
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - shoulder_pan
      - shoulder_lift
      - elbow_flex
      - wrist_flex
      - wrist_roll
      - gripper_joint
    
    command_interfaces:
      - position
    
    state_interfaces:
      - position
      - velocity

    # Optional: help the controller stay on track
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false